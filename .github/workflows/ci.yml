name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, Check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        # GHSA-j687-52p2-xcff (Astro XSS in define:vars) only fixed in Astro 6+.
        # Risk is negligible on this static blog: no user input reaches define:vars.
        run: npm audit --omit=dev --audit-level=moderate --ignore-advisories GHSA-j687-52p2-xcff

      - name: Type check
        run: npx astro check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Check internal links
        run: npm run check-links

      - name: Lighthouse CI
        run: npx @lhci/cli@0.15 autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
